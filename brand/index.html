<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nogada Guide · 가이드</title>
  <meta name="description" content="Nogada — EVM NFT minting bot user guide / 사용 설명서">
  <link rel="icon" href="gitbook/images/favicon.ico" type="image/x-icon">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(1200px 600px at 50% -10%, #18222f 0%, #0e1116 60%);
      color: #e8ebf0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
      padding: 24px;
    }
    .card { text-align: center; max-width: 460px; width: 100%; }
    .logo {
      width: 92px; height: 92px; border-radius: 22px;
      box-shadow: 0 10px 34px rgba(0,0,0,.55); margin-bottom: 22px;
    }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -.5px; }
    .sub { color: #99a3b2; margin: 8px 0 32px; font-size: 14.5px; }
    .langs { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn {
      flex: 1 1 0; min-width: 180px; padding: 18px 20px; border-radius: 14px;
      background: #1a2230; color: #fff; text-decoration: none;
      border: 1px solid #2a3446; font-size: 18px; font-weight: 600;
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
    }
    .btn:hover { background: #233044; border-color: #3c4d68; transform: translateY(-2px); }
    .btn small { display: block; margin-top: 4px; font-size: 12.5px; font-weight: 400; color: #8d97a7; }
    .foot { margin-top: 30px; font-size: 12px; color: #66707e; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="Nogada">
    <h1>Nogada Guide</h1>
    <p class="sub">EVM NFT 민팅 봇 사용 설명서 · User Guide</p>
    <div class="langs">
      <a class="btn" href="ko/">한국어<small>한국어 가이드 보기</small></a>
      <a class="btn" href="en/">English<small>Read the English guide</small></a>
    </div>
    <p class="foot">Nogada</p>
  </main>
</body>
</html>
